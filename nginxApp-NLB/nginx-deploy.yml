apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-samui
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-samui
  template:
    metadata:
      labels:
        app: nginx-samui
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-samui
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
